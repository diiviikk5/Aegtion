name: check

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run check
      - run: npm run demo
      - run: node ./bin/aegtion.js latest ./examples/landing-page-review.aegtion.yaml
